<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="assets/stock-guard.ico" />
    <title>股票对比 | 鼓手</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell detail-shell">
      <section class="hero compact-hero">
        <div class="hero-copy">
          <div class="brandline"><span class="mark"></span><span>鼓手</span></div>
          <h1>股票对比</h1>
          <p>输入两支股票，比较估值、研究面板与仓位判断。</p>
        </div>
      </section>

      <section class="panel compare-panel">
        <div class="compare-form">
          <label>股票 A<input id="symbolA" value="600879.SH" /></label>
          <label>股票 B<input id="symbolB" value="002049.SZ" /></label>
          <button id="compareButton" type="button">开始对比</button>
          <a class="link-button" href="/">返回总览</a>
        </div>
        <div id="compareContent" class="empty-state compact-empty">
          <h2>等待对比</h2>
          <p>建议先试航天电子与紫光国微。</p>
        </div>
      </section>
    </main>
    <script src="compare.js"></script>
  </body>
</html>
